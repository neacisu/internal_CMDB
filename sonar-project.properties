# SonarQube project configuration — InternalCMDB
# Violations reported in /usr/local/lib/python3.14/typing.py or any other
# stdlib / venv path are false positives caused by an unbounded scan scope.
# This file restricts analysis to project-owned code only.

sonar.projectKey=neacisu_internal_CMDB
sonar.projectName=InternalCMDB
sonar.projectVersion=0.1.0

# ── Source roots ──────────────────────────────────────────────────────────────
# Only scan project code; never the Python stdlib or installed packages.
sonar.sources=src
sonar.tests=tests
sonar.python.version=3.13

# ── Exclusions ────────────────────────────────────────────────────────────────
# Python stdlib (3.13 / 3.14 – both CPython layout variants)
# Virtual-environment site-packages
# Alembic auto-generated migration scripts
# Compiled bytecode, caches, build artefacts
# Frontend node_modules (not Python but guard belt-and-suspenders)
sonar.exclusions=\
  /usr/local/lib/**,\
  /usr/lib/**,\
  /usr/local/lib/python3.13/**,\
  /usr/local/lib/python3.14/**,\
  .venv/**,\
  **/.venv/**,\
  **/site-packages/**,\
  **/dist-packages/**,\
  **/migrations/versions/**,\
  **/__pycache__/**,\
  **/*.pyc,\
  **/*.pyo,\
  build/**,\
  dist/**,\
  frontend/node_modules/**,\
  subprojects/**,\
  scripts/**,\
  Research/**,\
  deploy/**,\
  docs/**

# Tests are already declared under sonar.tests; exclude them from sonar.sources
# analysis so issues are not double-counted.
sonar.test.exclusions=\
  tests/**

# ── Coverage ──────────────────────────────────────────────────────────────────
sonar.python.coverage.reportPaths=coverage.xml

# ── Encoding ──────────────────────────────────────────────────────────────────
sonar.sourceEncoding=UTF-8
