
# ============================================================================
# WAPP Pro App — LXC wapp-pro-app (10.0.1.105) via HAProxy VIP 10.0.1.10
# Added: internalCMDB deploy/haproxy/wapp-pro-app.cfg
# Ref: docs/wapp_pro_app.md §3.2
#
# Porturi:
#   26010 → 10.0.1.105:26001  WAPP Gateway (WebSocket / long timeout)
#   26011 → 10.0.1.105:26002  WAPP Admin (Next.js)
#   26012 → 10.0.1.105:26000  Evolution API
#   26013 → 10.0.1.105:26004  Workers health / metrics scrape
# ============================================================================

frontend wapp_gateway_in
  bind 10.0.1.10:26010
  mode http
  option httplog
  default_backend wapp_gateway_out

backend wapp_gateway_out
  mode http
  timeout connect 10s
  timeout server 86400s
  timeout tunnel 86400s
  server wapp-gw 10.0.1.105:26001 check inter 30s rise 2 fall 3

frontend wapp_admin_in
  bind 10.0.1.10:26011
  mode http
  option httplog
  default_backend wapp_admin_out

backend wapp_admin_out
  mode http
  timeout connect 10s
  timeout server 300s
  server wapp-admin 10.0.1.105:26002 check inter 30s rise 2 fall 3

frontend wapp_evo_core_in
  bind 10.0.1.10:26012
  mode http
  option httplog
  default_backend wapp_evo_core_out

backend wapp_evo_core_out
  mode http
  timeout connect 10s
  timeout server 300s
  server wapp-evo 10.0.1.105:26000 check inter 30s rise 2 fall 3

frontend wapp_workers_in
  bind 10.0.1.10:26013
  mode http
  option httplog
  default_backend wapp_workers_out

backend wapp_workers_out
  mode http
  timeout connect 10s
  timeout server 120s
  server wapp-workers 10.0.1.105:26004 check inter 30s rise 2 fall 3
