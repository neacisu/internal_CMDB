# Agent config: neanelu-prod (LXC 111 on hz.215)
# Role: Production web application

[agent]
api_url = "https://infraq.app/api/v1/collectors"
host_code = "lxc-neanelu-prod"
log_level = "INFO"
verify_ssl = true

[collectors]
enabled = [
    "heartbeat",
    "system_vitals",
    "service_health",
    "network_state",
    "disk_state",
    "process_inventory",
    "systemd_state",
    "journal_errors",
    "trust_surface_lite",
    "certificate_state",
    "security_posture",
    "full_audit",
]
