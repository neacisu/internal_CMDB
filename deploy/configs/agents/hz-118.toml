# Agent config: hz.118 / Proxmox VE 9.1.5 STANDALONE ("proxmox2")
# kernel 6.17.9-1-pve — public 95.216.72.118
# vSwitch IP: 10.0.1.4
# Resources: 48 cores, 126 GB RAM, 1.8 TB disk (851 GB free)
# LXC guests: 100 (server.traktors.ro), 101 (tecdocnode),
#             102 (tecdocmysql), 103 (mediserver2)

[agent]
api_url = "https://infraq.app/api/v1/collectors"
host_code = "hz.118"
log_level = "INFO"
verify_ssl = true

[collectors]
enabled = [
    "heartbeat",
    "system_vitals",
    "docker_state",
    "container_resources",
    "service_health",
    "network_state",
    "disk_state",
    "process_inventory",
    "systemd_state",
    "journal_errors",
    "trust_surface_lite",
    "certificate_state",
    "security_posture",
    "full_hardware",
    "full_audit",
]

[lxc]
enabled = true
container_ids = [100, 101, 102, 103]
collect_via = "pct_exec"
