# Agent config: hz.164 / Proxmox host (Proxmox profile)
# Role: Proxmox hypervisor, LXC host, Cerniq containers

[agent]
api_url = "https://infraq.app/api/v1/collectors"
host_code = "hz.164"
log_level = "INFO"
verify_ssl = true

[collectors]
enabled = [
    "heartbeat",
    "system_vitals",
    "docker_state",
    "container_resources",
    "service_health",
    "network_state",
    "disk_state",
    "process_inventory",
    "systemd_state",
    "journal_errors",
    "trust_surface_lite",
    "certificate_state",
    "security_posture",
    "full_hardware",
    "full_audit",
]

[lxc]
enabled = true
container_ids = [100, 101, 102]
collect_via = "pct_exec"
