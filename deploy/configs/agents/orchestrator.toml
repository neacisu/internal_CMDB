# Agent config: orchestrator / Proxmox VE 9.1.5, kernel 6.12.73+deb13-cloud-amd64
# Cluster: "NewCluster" (Node ID 1) — public 77.42.76.185
# vSwitch IP: 10.0.1.18
# Resources: 8 cores, 15 GB RAM, 38 GB disk
# Role: Control plane, Prometheus, Traefik, HAProxy, Docker host, CMDB API
# No LXC/VM guests on this node

[agent]
api_url = "https://infraq.app/api/v1/collectors"
host_code = "orchestrator"
log_level = "INFO"
verify_ssl = true

[collectors]
enabled = [
    "heartbeat",
    "system_vitals",
    "docker_state",
    "container_resources",
    "service_health",
    "network_state",
    "disk_state",
    "process_inventory",
    "systemd_state",
    "journal_errors",
    "trust_surface_lite",
    "certificate_state",
    "security_posture",
    "full_hardware",
    "full_audit",
]
