# Agent config: orchestrator (77.42.76.185)
# Role: Control plane, Prometheus, HAProxy, Docker host

[agent]
api_url = "https://infraq.app/api/v1/collectors"
host_code = "orchestrator"
log_level = "INFO"
verify_ssl = true

[collectors]
enabled = [
    "heartbeat",
    "system_vitals",
    "docker_state",
    "container_resources",
    "service_health",
    "network_state",
    "disk_state",
    "process_inventory",
    "systemd_state",
    "journal_errors",
    "trust_surface_lite",
    "certificate_state",
    "security_posture",
    "full_hardware",
    "full_audit",
]
