# Agent config: hz.62 (GPU embed profile — Ollama embedding model)
# Role: Embedding inference node, Qwen3-Embedding-8B

[agent]
api_url = "https://infraq.app/api/v1/collectors"
host_code = "hz.62"
log_level = "INFO"
verify_ssl = true

[collectors]
enabled = [
    "heartbeat",
    "system_vitals",
    "docker_state",
    "container_resources",
    "gpu_state",
    "llm_endpoint_health",
    "service_health",
    "network_state",
    "network_latency",
    "disk_state",
    "process_inventory",
    "systemd_state",
    "journal_errors",
    "trust_surface_lite",
    "certificate_state",
    "security_posture",
    "full_hardware",
    "full_audit",
]
