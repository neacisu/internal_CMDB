# Agent config: prod-cerniq (LXC 109 on hz.223)
# Role: Production Cerniq application

[agent]
api_url = "https://infraq.app/api/v1/collectors"
host_code = "lxc-prod-cerniq"
log_level = "INFO"
verify_ssl = true

[collectors]
enabled = [
    "heartbeat",
    "system_vitals",
    "docker_state",
    "container_resources",
    "service_health",
    "network_state",
    "disk_state",
    "process_inventory",
    "systemd_state",
    "journal_errors",
    "trust_surface_lite",
    "certificate_state",
    "security_posture",
    "full_audit",
]
