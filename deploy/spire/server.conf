server {
    bind_address = "0.0.0.0"
    bind_port = "8081"
    trust_domain = "internalcmdb.local"
    data_dir = "/opt/spire/data/server"
    log_level = "INFO"
    default_x509_svid_ttl = "1h"
    ca_ttl = "24h"

    ca_subject {
        country = ["RO"]
        organization = ["internalCMDB"]
        common_name = "internalcmdb-spire-ca"
    }
}

plugins {
    DataStore "sql" {
        plugin_data {
            database_type = "sqlite3"
            connection_string = "/opt/spire/data/server/datastore.sqlite3"
        }
    }

    NodeAttestor "join_token" {
        plugin_data {}
    }

    KeyManager "disk" {
        plugin_data {
            keys_path = "/opt/spire/data/server/keys.json"
        }
    }

    Notifier "k8sbundle" {
        plugin_data {}
        disabled = true
    }
}

health_checks {
    listener_enabled = true
    bind_address = "0.0.0.0"
    bind_port = "8080"
    live_path = "/live"
    ready_path = "/ready"
}
