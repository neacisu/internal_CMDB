# ============================================================================
# Prometheus — scrape configuration for InternalCMDB infrastructure
# ============================================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

rule_files:
  - "rules/host_alerts.yml"
  - "rules/gpu_alerts.yml"
  - "rules/llm_alerts.yml"
  - "rules/cmdb_alerts.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - "127.0.0.1:9093"

scrape_configs:
  # ── Prometheus self-monitoring ───────────────────────────────────────────
  - job_name: "prometheus"
    static_configs:
      - targets: ["127.0.0.1:9090"]

  # ── Node exporter (host metrics) ────────────────────────────────────────
  - job_name: "node-exporter"
    static_configs:
      - targets:
          - "10.0.1.1:9100"
          - "10.0.1.10:9100"
        labels:
          env: "production"

  # ── cAdvisor (container metrics) ────────────────────────────────────────
  - job_name: "cadvisor"
    static_configs:
      - targets:
          - "10.0.1.1:8080"
          - "10.0.1.10:8080"

  # ── PostgreSQL exporter ─────────────────────────────────────────────────
  - job_name: "postgres-exporter"
    static_configs:
      - targets: ["127.0.0.1:9187"]

  # ── NVIDIA GPU metrics (DCGM exporter) ─────────────────────────────────
  - job_name: "dcgm-exporter"
    static_configs:
      - targets: ["10.0.1.10:9400"]

  # ── vLLM model servers ──────────────────────────────────────────────────
  - job_name: "vllm"
    metrics_path: "/metrics"
    static_configs:
      - targets:
          - "10.0.1.10:49001"
          - "10.0.1.10:49002"

  # ── InternalCMDB FastAPI ────────────────────────────────────────────────
  - job_name: "internalcmdb"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["127.0.0.1:4444"]

  # ── Redis exporter ────────────────────────────────────────────────────
  - job_name: "redis-exporter"
    static_configs:
      - targets: ["127.0.0.1:9121"]

  # ── Blackbox exporter (endpoint probes) ─────────────────────────────────
  - job_name: "blackbox-http"
    metrics_path: "/probe"
    params:
      module: ["http_2xx"]
    static_configs:
      - targets:
          - "https://infraq.app/health"
          - "https://infraq.app/llm/v1/reasoning/health"
          - "https://infraq.app/llm/v1/fast/health"
          - "https://infraq.app/llm/v1/guard/healthz"
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: "127.0.0.1:9115"
