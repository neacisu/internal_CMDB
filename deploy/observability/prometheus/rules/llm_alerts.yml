groups:
  - name: llm_alerts
    rules:
      - alert: LLMEndpointDown
        expr: probe_success{job="blackbox-http", service=~"vllm-.*|llm-.*|ollama-.*"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "LLM endpoint unreachable: {{ $labels.service }}"
          description: "Blackbox HTTP probe for {{ $labels.service }} ({{ $labels.instance }}) has failed for more than 1 minute."

      - alert: CMDBEndpointDown
        expr: probe_success{job="blackbox-http", service="internalcmdb-api"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "InternalCMDB API unreachable"
          description: "Blackbox HTTP probe for InternalCMDB API ({{ $labels.instance }}) has failed for more than 1 minute."

      - alert: InternalServiceDown
        expr: probe_success{job="blackbox-tcp"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Internal service unreachable: {{ $labels.service }}"
          description: "TCP probe for {{ $labels.service }} ({{ $labels.instance }}) has failed for more than 2 minutes."

      - alert: LLMQueueDepth
        expr: vllm:num_requests_waiting > 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "LLM request queue depth high on {{ $labels.instance }}"
          description: "vLLM instance {{ $labels.instance }} has {{ $value }} waiting requests (threshold: 10) for more than 5 minutes."

      - alert: LLMHighLatency
        expr: histogram_quantile(0.99, rate(vllm:e2e_request_latency_seconds_bucket[5m])) > 30
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "LLM p99 latency high on {{ $labels.instance }}"
          description: "vLLM instance {{ $labels.instance }} p99 latency is {{ $value | printf \"%.1f\" }}s (threshold: 30s)."

      - alert: LLMGPUCacheUtilizationHigh
        expr: vllm:gpu_cache_usage_perc > 0.95
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "vLLM GPU KV cache near capacity on {{ $labels.instance }}"
          description: "vLLM GPU KV cache utilization is at {{ $value | printf \"%.1f\" }}% on {{ $labels.instance }}."
