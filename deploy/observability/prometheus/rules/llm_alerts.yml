groups:
  - name: llm_alerts
    rules:
      - alert: LLMEndpointDown
        expr: probe_success{job="blackbox-http", service=~"litellm-.*|llm-.*"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "LLM endpoint unreachable: {{ $labels.service }}"
          description: "Blackbox HTTP probe for {{ $labels.service }} ({{ $labels.instance }}) has failed for more than 1 minute."

      - alert: CMDBEndpointDown
        expr: probe_success{job="blackbox-http", service="internalcmdb-api"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "InternalCMDB API unreachable"
          description: "Blackbox HTTP probe for InternalCMDB API ({{ $labels.instance }}) has failed for more than 1 minute."

      - alert: InternalServiceDown
        expr: probe_success{job="blackbox-tcp"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Internal service unreachable: {{ $labels.service }}"
          description: "TCP probe for {{ $labels.service }} ({{ $labels.instance }}) has failed for more than 2 minutes."

      - alert: LiteLLMHighLatency
        expr: histogram_quantile(0.99, rate(litellm_request_total_latency_bucket[5m])) > 30
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "LiteLLM p99 latency high on {{ $labels.instance }}"
          description: "LiteLLM instance {{ $labels.instance }} p99 latency exceeds 30s."

      # Deprecated GPU alerts — hz.113/hz.62 decommissioned 2026-07-05
      # - alert: LLMQueueDepth (vllm:num_requests_waiting)
      # - alert: LLMGPUCacheUtilizationHigh (vllm:gpu_cache_usage_perc)
