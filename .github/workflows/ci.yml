name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["*"]

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.14"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint
        run: make lint

      - name: Type Check
        run: make type

      - name: Unit Tests
        run: make test

      - name: Security Scan (Bandit)
        run: make security

      - name: Dependency Audit
        run: make audit

      - name: Build
        run: make build

      - name: YAML lint (deploy + workflows)
        run: make yaml-lint

      - name: Subprojects tests
        run: make subprojects-test

      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Run shellcheck
        run: make shellcheck

  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install and run actionlint
        run: |
          set -euo pipefail
          bash <(curl -fsSL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          ./actionlint -color .github/workflows/

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install and test
        working-directory: frontend
        run: |
          pnpm install --frozen-lockfile
          pnpm run lint
          pnpm exec vitest run --coverage
      - name: Upload frontend coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage
          if-no-files-found: ignore

  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep:1.157.0
    # Required: add SEMGREP_APP_TOKEN to GitHub repo secrets:
    #   Settings → Secrets and variables → Actions → New repository secret
    #   Name: SEMGREP_APP_TOKEN
    #   Value: token from https://semgrep.dev/orgs/-/settings/tokens
    #          (same token saved in ~/.semgrep/settings.yml after `semgrep login`)
    env:
      SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run custom rules (no auth required)
        run: |
          semgrep scan --config .semgrep/ \
                  --severity WARNING \
                  --error \
                  --metrics=off \
                  --json \
                  src frontend/src > semgrep-custom.json 2>&1 || true

      - name: Run community rulesets (requires SEMGREP_APP_TOKEN secret)
        run: |
          semgrep scan \
                  --config p/python \
                  --config p/owasp-top-ten \
                  --config p/fastapi \
                  --config p/typescript \
                  --config p/javascript \
                  --config p/react \
                  --config p/nodejs \
                  --config p/sql-injection \
                  --config p/xss \
                  --config p/secrets \
                  --severity WARNING \
                  --error \
                  --metrics=off \
                  --json \
                  src frontend/src > semgrep-community.json 2>&1

      - name: Upload Semgrep results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-results
          path: |
            semgrep-custom.json
            semgrep-community.json
          if-no-files-found: ignore
