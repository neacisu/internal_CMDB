name: CD

on:
  push:
    branches: ["main"]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  DEPLOY_DIR: /opt/stacks/internalcmdb
  COMPOSE_FILE: /opt/stacks/internalcmdb/deploy/orchestrator/docker-compose.internalcmdb.prod.yml
  DEPLOY_HOST: orchestrator

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.14"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint
        run: make lint

      - name: Type Check
        run: make type

      - name: Unit Tests
        run: make test

      - name: Security Scan
        run: make security

  build-and-deploy:
    needs: test
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build API image
        run: |
          DOCKER_BUILDKIT=1 docker build \
            -f Dockerfile.api \
            -t ghcr.io/alexneacsu/internalcmdb-api:${{ github.sha }} \
            -t ghcr.io/alexneacsu/internalcmdb-api:latest \
            .

      - name: Build frontend image
        run: |
          DOCKER_BUILDKIT=1 docker build \
            -f Dockerfile.frontend \
            -t ghcr.io/alexneacsu/internalcmdb-frontend:${{ github.sha }} \
            -t ghcr.io/alexneacsu/internalcmdb-frontend:latest \
            .

      - name: Push images
        run: |
          docker push ghcr.io/alexneacsu/internalcmdb-api:${{ github.sha }}
          docker push ghcr.io/alexneacsu/internalcmdb-api:latest
          docker push ghcr.io/alexneacsu/internalcmdb-frontend:${{ github.sha }}
          docker push ghcr.io/alexneacsu/internalcmdb-frontend:latest

      # Supply-chain verification (F5.5) — enable after cosign key setup:
      # - name: Install cosign
      #   uses: sigstore/cosign-installer@v3
      #
      # - name: Verify signed API image
      #   env:
      #     COSIGN_EXPERIMENTAL: "false"
      #   run: |
      #     cosign verify \
      #       --certificate-identity-regexp='https://github.com/${{ github.repository }}/.+' \
      #       --certificate-oidc-issuer=https://token.actions.githubusercontent.com \
      #       ghcr.io/alexneacsu/internalcmdb-api@${{ steps.digest.outputs.api_digest }}
      #
      # - name: Verify signed frontend image
      #   run: |
      #     cosign verify \
      #       --certificate-identity-regexp='https://github.com/${{ github.repository }}/.+' \
      #       --certificate-oidc-issuer=https://token.actions.githubusercontent.com \
      #       ghcr.io/alexneacsu/internalcmdb-frontend@${{ steps.digest.outputs.frontend_digest }}
      #
      # Pin by digest in production compose — see deploy/orchestrator/README.md

      - name: Deploy to orchestrator
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd ${{ env.DEPLOY_DIR }}
            git pull origin main

            make migrate-check
            alembic -c alembic.ini upgrade head

            cp deploy/orchestrator/internalcmdb.prod.yml /opt/traefik/dynamic/internalcmdb.yml
            cp deploy/orchestrator/llm-api.yml /opt/traefik/dynamic/llm-api.yml
            cp deploy/orchestrator/cmdb-api.yml /opt/traefik/dynamic/cmdb-api.yml

            docker pull ghcr.io/alexneacsu/internalcmdb-api:latest
            docker pull ghcr.io/alexneacsu/internalcmdb-frontend:latest

            PREV_API=$(docker inspect --format='{{.Image}}' internalcmdb-api 2>/dev/null || echo "none")

            docker compose -f ${{ env.COMPOSE_FILE }} up -d

            for i in $(seq 1 30); do
              if curl -sf http://localhost:4444/health > /dev/null 2>&1; then
                echo "Health check passed after ${i}s"
                exit 0
              fi
              sleep 1
            done

            echo "ERROR: Health check failed — rolling back API image only"
            if [ "$PREV_API" != "none" ]; then
              docker tag "$PREV_API" ghcr.io/alexneacsu/internalcmdb-api:latest
              docker compose -f ${{ env.COMPOSE_FILE }} up -d --no-deps internalcmdb-api internalcmdb-worker internalcmdb-scheduler
            fi
            exit 1

      - name: Post-deploy health verification
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            curl -sf https://infraq.app/health | jq .
