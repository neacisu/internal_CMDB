name: CD

on:
  push:
    branches: ["main"]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  DEPLOY_DIR: /opt/stacks/internalcmdb
  COMPOSE_FILE: /opt/stacks/internalcmdb/deploy/orchestrator/docker-compose.internalcmdb.yml
  DEPLOY_HOST: orchestrator

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.14"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint
        run: make lint

      - name: Type Check
        run: make type

      - name: Unit Tests
        run: make test

      - name: Security Scan
        run: make security

  build-and-deploy:
    needs: test
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # API image is built on GH Actions and pushed to GHCR.
      # The orchestrator pulls it at deploy time.
      - name: Build API image
        run: |
          DOCKER_BUILDKIT=1 docker build \
            -f Dockerfile.api \
            -t ghcr.io/alexneacsu/internalcmdb-api:${{ github.sha }} \
            -t ghcr.io/alexneacsu/internalcmdb-api:latest \
            .

      # Frontend runs as next dev (hot-reload) on the orchestrator.
      # The dev image (node_modules pre-installed, source bind-mounted) is built
      # locally on the orchestrator — no GHCR push needed for frontend.

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push API image
        run: |
          docker push ghcr.io/alexneacsu/internalcmdb-api:${{ github.sha }}
          docker push ghcr.io/alexneacsu/internalcmdb-api:latest

      - name: Deploy to orchestrator
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd ${{ env.DEPLOY_DIR }}
            git pull origin main

            # Run migration safety check, then apply
            make migrate-check
            alembic -c alembic.ini upgrade head

            # Pull latest API image
            docker pull ghcr.io/alexneacsu/internalcmdb-api:latest

            # Rebuild frontend dev image locally (only deps layer; source is bind-mounted)
            DOCKER_BUILDKIT=1 docker build \
              -f Dockerfile.frontend.dev \
              -t internalcmdb-frontend:dev \
              .

            # Deploy with rollback capability
            PREV_API=$(docker inspect --format='{{.Image}}' internalcmdb-api 2>/dev/null || echo "none")

            docker compose -f ${{ env.COMPOSE_FILE }} up -d

            # Health check (30s timeout)
            for i in $(seq 1 30); do
              if curl -sf http://localhost:4444/health > /dev/null 2>&1; then
                echo "Health check passed after ${i}s"
                exit 0
              fi
              sleep 1
            done

            # Rollback on failure
            echo "ERROR: Health check failed — rolling back"
            alembic -c alembic.ini downgrade -1 || echo "WARNING: migration downgrade failed"
            if [ "$PREV_API" != "none" ]; then
              docker tag "$PREV_API" ghcr.io/alexneacsu/internalcmdb-api:latest
              docker compose -f ${{ env.COMPOSE_FILE }} up -d --no-deps internalcmdb-api internalcmdb-worker
            fi
            # Frontend rollback: git reset to previous commit restores source on bind-mount;
            # next dev picks up changes immediately without container restart.
            git reset --hard HEAD~1
            exit 1

      - name: Post-deploy health verification
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            curl -sf https://infraq.app/health | jq .
