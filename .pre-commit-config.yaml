repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-merge-conflict
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.12.12
    hooks:
      - id: ruff-check
        args: ["--fix"]
      - id: ruff-format
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.17.1
    hooks:
      - id: mypy
        additional_dependencies: ["types-setuptools>=80.9.0.20250822"]
  - repo: local
    hooks:
      - id: gitleaks-pre-push
        name: gitleaks pre-push
        entry: bash -c 'command -v gitleaks >/dev/null 2>&1 || { echo "gitleaks is required in PATH for pre-push secret scanning."; exit 1; }; gitleaks dir . --no-banner --redact'
        language: system
        pass_filenames: false
        stages: [pre-push]
