repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-merge-conflict
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.12.12
    hooks:
      - id: ruff-check
        args: ["--fix"]
      - id: ruff-format
  - repo: local
    hooks:
      - id: mypy
        name: mypy
        language: system
        entry: .venv/bin/mypy
        args: ["src", "tests", "--config-file", "pyproject.toml"]
        pass_filenames: false
        types: [python]
  - repo: local
    hooks:
      - id: gitleaks-pre-push
        name: gitleaks pre-push
        entry: bash -c 'command -v gitleaks >/dev/null 2>&1 || { echo "gitleaks is required in PATH for pre-push secret scanning."; exit 1; }; for d in src tests scripts subprojects; do [ -d "$d" ] && gitleaks dir "$d" --no-banner --redact --config .gitleaks.toml || exit 1; done'
        language: system
        pass_filenames: false
        stages: [pre-push]
