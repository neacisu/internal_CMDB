[build-system]
requires = ["hatchling>=1.27.0"]
build-backend = "hatchling.build"

[project]
name = "proiecteit"
version = "0.1.0"
description = "Enterprise-grade Python project baseline"
readme = "README.md"
requires-python = ">=3.14"
authors = [
  { name = "Alex Neacsu" }
]
license = { text = "Proprietary" }
dependencies = []

[project.optional-dependencies]
dev = [
  "bandit[toml]>=1.8.6",
  "build>=1.3.0",
  "mypy>=1.17.1",
  "pip-audit>=2.9.0",
  "pre-commit>=4.3.0",
  "pytest>=8.4.2",
  "pytest-cov>=7.0.0",
  "ruff>=0.12.12",
  "types-setuptools>=80.9.0.20250822"
]

[tool.hatch.build.targets.wheel]
packages = ["src/proiecteit"]

[tool.pytest.ini_options]
minversion = "8.0"
addopts = "-ra --strict-markers --strict-config --cov=src/proiecteit --cov-report=term-missing --cov-report=xml --cov-fail-under=90"
testpaths = ["tests"]
pythonpath = ["src"]

[tool.coverage.run]
branch = true
source = ["src/proiecteit"]

[tool.coverage.report]
show_missing = true
skip_covered = false
fail_under = 90

[tool.ruff]
line-length = 100
target-version = "py314"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "UP", "B", "A", "C4", "PT", "SIM", "PL", "RUF"]
ignore = ["PLR0913"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"

[tool.mypy]
python_version = "3.14"
strict = true
pretty = true
show_error_codes = true
warn_unreachable = true
mypy_path = "src"

[tool.bandit]
exclude_dirs = ["tests", ".venv", "build", "dist"]
severity = "medium"
confidence = "medium"

[tool.pip-audit]
progress-spinner = "off"
strict = true
