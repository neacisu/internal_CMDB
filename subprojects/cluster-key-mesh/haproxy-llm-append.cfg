
# ============================================================================
# LLM Gateway (lxc-llm-guard 10.0.1.115) — LiteLLM → OpenRouter
# Updated: 2026-07-05 — replaces hz.113 (vLLM) and hz.62 (Ollama)
# ============================================================================
# Porturi alocate (HAProxy VIP 10.0.1.10):
#   10.0.1.10:49000 -> 10.0.1.115:3000  (Open WebUI)
#   10.0.1.10:49001 -> 10.0.1.115:8001  (LiteLLM reasoning → deepseek-v4-pro)
#   10.0.1.10:49002 -> 10.0.1.115:8001  (LiteLLM fast → deepseek-v4-flash)
#   10.0.1.10:49003 -> 10.0.1.115:8001  (LiteLLM embed → qwen3-embedding-8b)
# ============================================================================

# --- Open WebUI (port 3000 pe lxc-llm-guard) ---
frontend llm_gateway_webui_in
  bind 10.0.1.10:49000
  default_backend llm_gateway_webui_out

backend llm_gateway_webui_out
  timeout connect 10s
  timeout server 300s
  server gateway-webui 10.0.1.115:3000 check inter 30s rise 2 fall 3

# --- LiteLLM Reasoning (port 8001) ---
frontend llm_gateway_reasoning_in
  bind 10.0.1.10:49001
  default_backend llm_gateway_reasoning_out

backend llm_gateway_reasoning_out
  timeout connect 10s
  timeout server 600s
  server gateway-reasoning 10.0.1.115:8001 check inter 30s rise 2 fall 3

# --- LiteLLM Fast (same gateway, model alias in request) ---
frontend llm_gateway_fast_in
  bind 10.0.1.10:49002
  default_backend llm_gateway_fast_out

backend llm_gateway_fast_out
  timeout connect 10s
  timeout server 300s
  server gateway-fast 10.0.1.115:8001 check inter 30s rise 2 fall 3

# --- LiteLLM Embeddings (same gateway) ---
frontend llm_gateway_embed_in
  bind 10.0.1.10:49003
  default_backend llm_gateway_embed_out

backend llm_gateway_embed_out
  timeout connect 10s
  timeout server 120s
  server gateway-embed 10.0.1.115:8001 check inter 30s rise 2 fall 3
