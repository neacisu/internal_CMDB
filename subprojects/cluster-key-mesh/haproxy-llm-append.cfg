
# ============================================================================
# LLM Node (hz.113) - Open WebUI + vLLM APIs
# Added: 2026-03-03
# ============================================================================
# hz.113 (10.0.1.13) este nod dedicat Hetzner pe vSwitch 4000.
# Orchestratorul (10.0.1.18/28) nu poate ajunge direct la 10.0.1.13
# (subnet /28 nu ruteza spre noduri dedicate pe vSwitch).
# Traficul trece prin HAProxy VIP 10.0.1.10 - pattern standard cluster.
#
# Porturi alocate:
#   10.0.1.10:49000 -> 10.0.1.13:3000  (Open WebUI)
#   10.0.1.10:49001 -> 10.0.1.13:8000  (vLLM QwQ-32B-AWQ  - reasoning)
#   10.0.1.10:49002 -> 10.0.1.13:8001  (vLLM Qwen2.5-14B-AWQ - fast)
#
# Timeout server marit pentru inferenta LLM (reasoning poate dura minute).
# Toate bind-urile sunt strict pe VIP intern 10.0.1.10 - zero impact extern.
# ============================================================================

# --- Open WebUI (port 3000 pe hz.113) ---
frontend llm_hz113_webui_in
  bind 10.0.1.10:49000
  default_backend llm_hz113_webui_out

backend llm_hz113_webui_out
  timeout connect 10s
  timeout server 300s
  server hz113-webui 10.0.1.13:3000 check inter 30s rise 2 fall 3

# --- vLLM QwQ-32B-AWQ API (port 8000 pe hz.113) ---
frontend llm_hz113_vllm_primary_in
  bind 10.0.1.10:49001
  default_backend llm_hz113_vllm_primary_out

backend llm_hz113_vllm_primary_out
  timeout connect 10s
  timeout server 600s
  server hz113-vllm-primary 10.0.1.13:8000 check inter 30s rise 2 fall 3

# --- vLLM Qwen2.5-14B-AWQ API (port 8001 pe hz.113) ---
frontend llm_hz113_vllm_secondary_in
  bind 10.0.1.10:49002
  default_backend llm_hz113_vllm_secondary_out

backend llm_hz113_vllm_secondary_out
  timeout connect 10s
  timeout server 300s
  server hz113-vllm-secondary 10.0.1.13:8001 check inter 30s rise 2 fall 3
